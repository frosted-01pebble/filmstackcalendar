<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FilmStack Calendar</title>
<link rel="icon" href="assets/filmstack-logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #ffffff; }
  body { font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  #root { min-height: 100vh; }
  ::selection { background: #1a1a1a; color: #fff; }
  input::placeholder, textarea::placeholder { color: #a3a3a3; }
</style>
</head>
<body>
<div id="root"></div>

<!-- Splash thumbnail shown while the bundle unpacks (and as the no-JS fallback). -->
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#1a1a1a"/>
    <g transform="translate(30 30)" fill="#ffffff">
      <rect x="0" y="0" width="40" height="40" rx="3"/>
      <g fill="#1a1a1a">
        <circle cx="6" cy="6" r="1.8"/>
        <circle cx="6" cy="14" r="1.8"/>
        <circle cx="6" cy="22" r="1.8"/>
        <circle cx="6" cy="30" r="1.8"/>
        <circle cx="34" cy="6" r="1.8"/>
        <circle cx="34" cy="14" r="1.8"/>
        <circle cx="34" cy="22" r="1.8"/>
        <circle cx="34" cy="30" r="1.8"/>
      </g>
      <text x="20" y="26" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="800" fill="#1a1a1a" text-anchor="middle">FS</text>
    </g>
  </svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Tweak defaults — edited in place by the host when the user changes a tweak. -->
<script>
  window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "logoStyle": "square",
    "brandWordmark": "center",
    "showThisWeek": true,
    "accentLevel": "quiet",
    "navDensity": "cozy"
  }/*EDITMODE-END*/;
</script>

<!-- Shared event data + helpers -->
<script src="events-data.js"></script>

<!-- localStorage-backed admin "backend" (auth + submissions) -->
<script src="admin-store.js"></script>

<!-- Tweaks panel (shared shell + form controls) -->
<script type="text/babel" src="tweaks-panel.jsx"></script>

<!-- Modals first so window.SB_*Modal handles exist when app-main bridges them. -->
<script type="text/babel" src="app-modals.jsx"></script>
<script type="text/babel" src="app-main.jsx"></script>

<!-- Mount -->
<script type="text/babel">
  const FilmStackCalendarApp = window.FilmStackCalendarApp;
  ReactDOM.createRoot(document.getElementById('root'))
    .render(<FilmStackCalendarApp />);
</script>

</body>
</html>
